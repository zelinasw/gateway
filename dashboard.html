<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jembatan Link Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: #121212; color: #fff; font-family: sans-serif; padding: 40px; margin: 0;">
    <div style="max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 30px; borderRadius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        <h2 style="text-align: center; color: #0099ff;">🔗 Jembatan Link Generator</h2>
        <form id="formLink">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px;">Kode Unik / ID Link</label>
                <input type="text" id="kode" placeholder="Contoh: Ygbz07" required style="width: 100%; padding: 10px; background: #252525; color: #fff; border: 1px solid #333; border-radius: 5px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px;">Link Tujuan (Web Film / Affiliate)</label>
                <input type="url" id="linkTujuan" placeholder="https://cdnviduy.site/..." required style="width: 100%; padding: 10px; background: #252525; color: #fff; border: 1px solid #333; border-radius: 5px; box-sizing: border-box;">
            </div>
            <button type="submit" id="btn" style="width: 100%; padding: 12px; background: #0099ff; color: #fff; font-weight: bold; border: none; border-radius: 5px; cursor: pointer;">🚀 Generate Jembatan Link</button>
        </form>

        <div id="boxHasil" style="display: none; margin-top: 30px; padding: 15px; background: #252525; border: 1px solid #0099ff; border-radius: 5px;">
            <p style="margin: 0 0 10px 0; color: #0099ff; font-weight: bold;">Hasil Link Siap Tebar:</p>
            <input type="text" id="hasilLink" readonly style="width: 100%; padding: 10px; background: #1e1e1e; color: #fff; border: 1px solid #444; text-align: center;" onclick="this.select(); document.execCommand('copy'); alert('Link disalin!');">
            <small style="color: #aaa; display: block; margin-top: 5px; text-align: center;">💡 Klik kolom untuk menyalin otomatis</small>
        </div>
    </div>

    <script>
        // MASUKKAN KREDENSIAL SUPABASE KAMU LANGSUNG DI SINI
        const SUPABASE_URL = "https://minnxsggeqyypnzppjdk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pbm54c2dnZXF5eXBuenBwamRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDUxMDgsImV4cCI6MjA5MzU4MTEwOH0.DmjA-THOVKD9dovF-Eea1ofToc8mrCB9TUrOEzuUZvY";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById("formLink").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn");
            btn.innerText = "Sedang Memproses...";

            const kode = document.getElementById("kode").value.replace(/\.mp4$/g, "").trim();
            const linkTujuan = document.getElementById("linkTujuan").value;

            const { error } = await supabase.from("link_jembatan").insert([{ kode_unik: kode, link_tujuan: linkTujuan }]);
            btn.innerText = "🚀 Generate Jembatan Link";

            if (error) {
                alert("Gagal! Kode unik sudah terpakai.");
            } else {
                const baseUrl = window.location.origin;
                document.getElementById("hasilLink").value = `${baseUrl}/${kode}.mp4`;
                document.getElementById("boxHasil").style.display = "block";
            }
        });
    </script>
</body>
</html>
