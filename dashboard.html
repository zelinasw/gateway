<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Jembatan Link Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: #121212; color: #fff; font-family: sans-serif; padding: 40px; margin: 0;">
    <div style="max-width: 700px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        <h2 style="text-align: center; color: #0099ff;">🔗 Bulk Jembatan Link Generator</h2>
        <p style="color: #aaa; text-align: center; font-size: 14px; margin-top: -10px; margin-bottom: 25px;">Copas banyak link dari fitur bulk web streaming kamu ke sini. Pisahkan dengan baris baru (Enter).</p>
        
        <form id="formLink">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Masukkan Semua Link Tujuan (Satu Link Per Baris)</label>
                <textarea id="bulkLinks" rows="8" placeholder="https://cdnviduy.site/watch/film1&#10;https://cdnviduy.site/watch/film2&#10;https://cdnviduy.site/watch/film3" required style="width: 100%; padding: 12px; background: #252525; color: #fff; border: 1px solid #333; border-radius: 5px; box-sizing: border-box; font-family: monospace; resize: vertical;"></textarea>
            </div>
            <button type="submit" id="btn" style="width: 100%; padding: 14px; background: #0099ff; color: #fff; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">🚀 Generate Semua Link Jembatan</button>
        </form>

        <div id="boxHasil" style="display: none; margin-top: 30px; padding: 20px; background: #252525; border: 1px solid #0099ff; border-radius: 5px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <p style="margin: 0; color: #0099ff; font-weight: bold;">Hasil Bulk Link Siap Tebar di FB (.mp4):</p>
                <button type="button" id="btnCopy" style="padding: 6px 15px; background: #22c55e; color: #fff; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;">📋 Copy All Links</button>
            </div>
            <textarea id="hasilLink" style="width: 100%; padding: 12px; background: #1e1e1e; color: #fff; border: 1px solid #444; border-radius: 5px; font-family: monospace; box-sizing: border-box; resize: vertical;" rows="8"></textarea>
            <small style="color: #aaa; display: block; margin-top: 8px; text-align: center;">💡 Gunakan tombol hijau untuk salin massal, atau blok langsung teks di atas jika ingin menyalin sebagian saja.</small>
        </div>
    </div>

    <script>
        // Kredensial Supabase milikmu yang sudah dimasukkan dengan benar
        const SUPABASE_URL = "https://blphdpdclapuxzxbtyzt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJscGhkcGRjbGFwdXh6eGJ0eXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyOTIwNjMsImV4cCI6MjA5NDg2ODA2M30.YizGLIR9BYh9J_hlI36a1-e70jE1i0SR3RPelwD6afw";
        
        // Perbaikan inisialisasi agar tidak tabrakan nama variabel objek
        const clientSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Fungsi pembentuk kode unik acak sepanjang 6 karakter (contoh: aB9zX1)
        function buatKodeAcak() {
            const karakter = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let hasil = '';
            for (let i = 0; i < 6; i++) {
                hasil += karakter.charAt(Math.floor(Math.random() * karakter.length));
            }
            return hasil;
        }

        // Fungsi tombol copy massal
        document.getElementById("btnCopy").addEventListener("click", () => {
            const hasilArea = document.getElementById("hasilLink");
            hasilArea.select();
            document.execCommand("copy");
            alert("Semua link berhasil disalin!");
        });

        document.getElementById("formLink").addEventListener("submit", async (e) => {
            // Mencegah halaman reload otomatis saat tombol ditekan (Menghindari reset halaman)
            e.preventDefault(); 
            
            const btn = document.getElementById("btn");
            const inputArea = document.getElementById("bulkLinks");
            const boxHasil = document.getElementById("boxHasil");
            const hasilArea = document.getElementById("hasilLink");

            btn.disabled = true;
            btn.innerText = "Sedang Memproses Massal...";
            
            try {
                // Ambil data text area, pisahkan berdasarkan baris, dan buang spasi kosong
                const barisLink = inputArea.value.split("\n");
                const kumpulanDataInsert = [];
                const kumpulanHasilLink = [];
                const baseUrl = window.location.origin;

                for (let link of barisLink) {
                    let linkBersih = link.trim();
                    if (linkBersih !== "") {
                        // Buat kode ID acak otomatis untuk link ini
                        let kodeUnik = buatKodeAcak();
                        
                        kumpulanDataInsert.push({
                            kode_unik: kodeUnik,
                            link_tujuan: linkBersih
                        });

                        // Format output menggunakan akhiran .mp4 palsu untuk mengelabui bot Facebook
                        kumpulanHasilLink.push(`${baseUrl}/${kodeUnik}.mp4`);
                    }
                }

                if (kumpulanDataInsert.length === 0) {
                    alert("Masukkan minimal satu link!");
                    btn.disabled = false;
                    btn.innerText = "🚀 Generate Semua Link Jembatan";
                    return;
                }

                // Masukkan data massal (Bulk Insert) ke Supabase dalam satu kali request
                const { error } = await clientSupabase.from("link_jembatan").insert(kumpulanDataInsert);
                
                if (error) {
                    alert("Gagal menyimpan ke database Supabase: " + error.message);
                    console.error(error);
                } else {
                    // Tampilkan semua hasil link jembatan di kotak textarea bawah
                    hasilArea.value = kumpulanHasilLink.join("\n");
                    boxHasil.style.display = "block";
                }

            } catch (err) {
                alert("Terjadi kesalahan sistem internal browser: " + err.message);
                console.error(err);
            }

            btn.disabled = false;
            btn.innerText = "🚀 Generate Semua Link Jembatan";
        });
    </script>
</body>
</html>
